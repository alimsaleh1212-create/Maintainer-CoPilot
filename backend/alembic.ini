[alembic]
# Path is relative to the directory where alembic is invoked (backend/).
script_location = alembic

# sqlalchemy.url is NOT set here — the URL is resolved from Vault via
# app.config.get_settings() inside alembic/env.py at migration time.

# Logging config applied by env.py
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
