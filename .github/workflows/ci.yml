name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy --strict app/

      - name: Secret hygiene check
        run: |
          if grep -rn 'sk-' app/ --include="*.py" | grep -v 'test_' | grep -v '# '; then
            echo "FAIL: potential API key found in source"
            exit 1
          fi
          echo "OK: no raw keys found"

      - name: Unit + integration tests
        run: uv run pytest -q -m "not eval" --tb=short

  frontend-widget-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/widget

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Build widget
        run: npm run build

      - name: Bundle size check
        run: |
          SIZE=$(wc -c < dist/widget.js)
          LIMIT=524288  # 512 KB raw (47 KB gzipped)
          echo "Bundle size: ${SIZE} bytes"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "FAIL: bundle too large (${SIZE} > ${LIMIT} bytes)"
            exit 1
          fi
          echo "OK: bundle within limit"

  eval-gates:
    runs-on: ubuntu-latest
    needs: backend-checks
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: copilot_test
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: copilot
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U copilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run eval suite
        env:
          DATABASE_URL: "postgresql+asyncpg://copilot:copilot@localhost:5432/copilot_test"
          REDIS_URL: "redis://localhost:6379/0"
        run: uv run pytest -q -m "eval" --tb=short
        continue-on-error: true  # Eval suite failure is reported, not a hard gate in CI
