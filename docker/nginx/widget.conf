server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Widget bundle — cache-busted by the loader via query string in prod.
    location /widget.js {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /widget.js =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health probe used by compose healthcheck.
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
