# Local-dev overrides — NOT committed to production deploys.
#
# Hot-reload strategy:
#   - Bind-mount source dirs so code changes are immediately visible.
#   - Named volumes for .venv so packages baked into the image are preserved.
#   - When Python packages change (pyproject.toml / uv.lock), run:
#       docker compose down -v && docker compose up -d --build
#
# Correct usage (auto-discovers this file when run from docker/):
#   cd docker && docker compose up -d
# Or from repo root with explicit files:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.override.yml up -d

services:
  # ── migrate: bind-mount alembic so new migrations are visible without rebuild ──
  migrate:
    volumes:
      - ../backend/alembic:/app/alembic

  api:
    volumes:
      - ../backend/app:/app/app
      - ../backend/prompts:/app/prompts
      - ../backend/scripts:/app/scripts
      - ../backend/tests:/app/tests
      - ../backend/alembic:/app/alembic
      - ../corpus:/corpus:ro
      - api_dev_venv:/app/.venv
    command:
      - uvicorn
      - app.api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/app

  model-server:
    volumes:
      - ../backend/model_server:/app/model_server
      - model_server_dev_venv:/app/.venv

  chatbot:
    volumes:
      - ../frontend/streamlit_ui:/app/src
      - chatbot_dev_venv:/app/.venv
    command:
      - streamlit
      - run
      - /app/src/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.runOnSave=true

  # ── demo hosts: bind-mount HTML so edits appear without rebuild ───────────
  host-allowed:
    volumes:
      - ../frontend/demo_host/allowed:/srv/allowed:ro

  host-disallowed:
    volumes:
      - ../frontend/demo_host/disallowed:/srv/disallowed:ro

volumes:
  api_dev_venv:
  model_server_dev_venv:
  chatbot_dev_venv:
